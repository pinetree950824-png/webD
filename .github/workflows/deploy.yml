name: DuelVerse CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd client
        npm ci

    - name: Verify Frontend Compilation (Vite Build)
      run: |
        cd client
        npm run build

    - name: Install Backend Dependencies
      run: |
        cd server
        npm ci

    # CD Step: Triggers automatic deployment on Render if the deploy hook secret is configured.
    # To configure, add RENDER_DEPLOY_HOOK as a secret in GitHub Repository settings.
    - name: Trigger Render Deploy Webhook
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.RENDER_WEBHOOK != ''
      env:
        RENDER_WEBHOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        echo "Triggering Render deployment..."
        curl -X POST "$RENDER_WEBHOOK"
        echo "Deployment webhook triggered successfully."
